<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSW Staff World Cup 2026 Sweepstake</title>
<style>
  :root {
    --red: #e0001a;
    --black: #1a1a1a;
    --white: #ffffff;
    --grey: #f4f4f4;
    --mid: #cccccc;
    --gold: #f5a623;
    --green: #27ae60;
    --orange: #e67e22;
    --blue: #2980b9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: var(--white); }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--black) 0%, #2a0008 100%);
    border-bottom: 4px solid var(--red);
    padding: 24px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .wsw-badge {
    width: 64px; height: 64px; background: var(--red);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: white; flex-shrink: 0;
    letter-spacing: -1px;
  }
  header h1 { font-size: 1.8em; font-weight: 800; }
  header h1 span { color: var(--red); }
  header p { color: #aaa; font-size: 0.9em; margin-top: 4px; }
  .updated-badge {
    margin-left: auto; background: var(--red); padding: 6px 14px;
    border-radius: 20px; font-size: 0.78em; font-weight: 600; white-space: nowrap;
  }

  /* NAV TABS */
  .tabs {
    background: #1a1a1a; border-bottom: 2px solid #333;
    padding: 0 32px; display: flex; gap: 0;
  }
  .tab {
    padding: 14px 24px; cursor: pointer; font-weight: 600; font-size: 0.9em;
    color: #888; border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: #ccc; }
  .tab.active { color: var(--white); border-bottom-color: var(--red); }

  /* MAIN */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* LEADERBOARD */
  .section-title {
    font-size: 1.1em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--red); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: #333;
  }

  .leaderboard {
    background: #1e1e1e; border-radius: 12px; overflow: hidden;
    border: 1px solid #333; margin-bottom: 32px;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 60px 1fr 80px 80px 80px 90px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid #2a2a2a;
    transition: background 0.15s;
  }
  .lb-row:hover { background: #252525; }
  .lb-row:last-child { border-bottom: none; }
  .lb-header {
    background: #252525; font-size: 0.75em; text-transform: uppercase;
    letter-spacing: 0.8px; color: #666; font-weight: 600;
  }
  .lb-header:hover { background: #252525; }

  .rank { font-size: 1.3em; font-weight: 800; color: #555; text-align: center; }
  .rank-1 .rank { color: #f5c518; }
  .rank-2 .rank { color: #aaa; }
  .rank-3 .rank { color: #cd7f32; }

  .rank-1 { background: linear-gradient(90deg, #2a2200 0%, #1e1e1e 40%); }
  .rank-2 { background: linear-gradient(90deg, #1a1a1a 0%, #1e1e1e 40%); }
  .rank-3 { background: linear-gradient(90deg, #1f1510 0%, #1e1e1e 40%); }

  .name { font-weight: 700; font-size: 1.05em; }
  .pts { font-size: 1.4em; font-weight: 800; color: var(--red); text-align: center; }
  .sub-stat { font-size: 0.85em; color: #888; text-align: center; }
  .progress-bar-wrap { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; }
  .progress-bar { height: 6px; background: var(--red); border-radius: 3px; transition: width 0.5s; }

  /* STATS ROW */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px;
  }
  .stat-card {
    background: #1e1e1e; border: 1px solid #333; border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-card .val { font-size: 2em; font-weight: 800; color: var(--red); }
  .stat-card .lbl { font-size: 0.8em; color: #777; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  /* MATCH TABLE */
  .match-filter { margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-btn {
    background: #252525; border: 1px solid #333; color: #888;
    padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 0.82em;
    font-weight: 600; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--red); border-color: var(--red); color: white; }

  .matches-grid { display: flex; flex-direction: column; gap: 16px; }
  .match-card {
    background: #1e1e1e; border: 1px solid #333; border-radius: 12px; overflow: hidden;
  }
  .match-header {
    background: #252525; padding: 12px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .match-header .match-date { color: #888; font-size: 0.78em; }
  .match-header .match-group {
    background: var(--red); color: white; padding: 2px 10px;
    border-radius: 12px; font-size: 0.72em; font-weight: 700;
  }
  .match-header .match-teams {
    font-weight: 700; font-size: 1em; flex: 1; text-align: center;
  }
  .match-header .actual-score {
    background: #1a1a1a; border: 2px solid var(--red); padding: 4px 14px;
    border-radius: 8px; font-size: 1em; font-weight: 800; color: var(--red);
    white-space: nowrap;
  }

  .predictions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 1px; background: #2a2a2a;
  }
  .pred-cell {
    background: #1e1e1e; padding: 12px; text-align: center;
  }
  .pred-name { font-size: 0.72em; color: #777; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; font-weight: 600; }
  .pred-score {
    font-size: 1.15em; font-weight: 700;
  }
  .pred-pts {
    font-size: 0.72em; margin-top: 4px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; display: inline-block;
  }
  .pts-6 { background: #1a3a1a; color: #4dff88; }
  .pts-3 { background: #2a2a00; color: #ffdd00; }
  .pts-0 { background: #2a1a1a; color: #666; }
  .pts-na { background: #1e1e1e; color: #444; }

  .exact { border-top: 2px solid var(--green); }
  .winner { border-top: 2px solid var(--gold); }
  .miss { border-top: 2px solid #444; }

  /* PLAYER VIEW */
  .player-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .player-btn {
    padding: 10px 20px; background: #252525; border: 1px solid #333;
    border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s;
    color: #aaa;
  }
  .player-btn:hover { border-color: var(--red); color: white; }
  .player-btn.active { background: var(--red); border-color: var(--red); color: white; }

  .player-detail { display: none; }
  .player-detail.active { display: block; }
  .player-header {
    background: linear-gradient(135deg, #2a0008 0%, #1a1a1a 100%);
    border: 1px solid #333; border-radius: 12px; padding: 24px 28px;
    display: flex; align-items: center; gap: 24px; margin-bottom: 24px;
  }
  .player-avatar {
    width: 72px; height: 72px; background: var(--red); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6em; font-weight: 900; color: white; flex-shrink: 0;
  }
  .player-stats { display: flex; gap: 24px; }
  .player-stat { text-align: center; }
  .player-stat .v { font-size: 1.8em; font-weight: 800; }
  .player-stat .l { font-size: 0.75em; color: #777; text-transform: uppercase; }

  .match-log { display: flex; flex-direction: column; gap: 8px; }
  .log-row {
    display: grid;
    grid-template-columns: 100px 1fr 90px 90px 60px;
    gap: 8px; background: #1e1e1e; border: 1px solid #2a2a2a;
    border-radius: 8px; padding: 12px 16px; align-items: center;
  }
  .log-row.exact { border-left: 3px solid var(--green); }
  .log-row.winner { border-left: 3px solid var(--gold); }
  .log-row.miss { border-left: 3px solid #333; }
  .log-date { font-size: 0.78em; color: #666; }
  .log-teams { font-weight: 600; font-size: 0.9em; }
  .log-actual { text-align: center; color: var(--red); font-weight: 700; }
  .log-pred { text-align: center; font-weight: 700; color: #aaa; }
  .log-pts { text-align: right; font-weight: 800; font-size: 1.1em; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    main { padding: 16px; }
    header { padding: 16px; }
    header h1 { font-size: 1.3em; }
    .lb-row { grid-template-columns: 40px 1fr 60px 70px; }
    .lb-row .sub-stat:nth-child(4),
    .lb-row .sub-stat:nth-child(5) { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

function calcPoints(match, contestant) {
  const pred = getPrediction(contestant, match.t1, match.t2);
  if (!pred) return { pts: 0, type: 'na', pred: null };
  const { p1, p2 } = pred;
  if (p1 === match.g1 && p2 === match.g2) return { pts: 6, type: 'exact', pred };
  if (getWinner(p1, p2) === getWinner(match.g1, match.g2)) return { pts: 3, type: 'winner', pred };
  return { pts: 0, type: 'miss', pred };
}

const scores = {};
const matchDetails = {};

CONTESTANTS.forEach(c => { scores[c] = { total: 0, exact: 0, winner: 0, miss: 0, na: 0 }; });

ACTUAL_RESULTS.forEach((match, idx) => {
  matchDetails[idx] = {};
  CONTESTANTS.forEach(c => {
    const r = calcPoints(match, c);
    if (match.scored) {
      scores[c].total += r.pts;
      scores[c][r.type]++;
    }
    matchDetails[idx][c] = { ...r, counted: match.scored };
  });
});

const ranked = [...CONTESTANTS].sort((a, b) => {
  if (scores[b].total !== scores[a].total) return scores[b].total - scores[a].total;
  if (scores[b].exact !== scores[a].exact) return scores[b].exact - scores[a].exact;
  return 0;
});

// =============================================
// RENDER
// =============================================
function renderLeaderboard() {
  const maxPts = scores[ranked[0]].total || 1;
  const scoredMatches = ACTUAL_RESULTS.filter(m => m.scored);
  const totalMatches = scoredMatches.length;
  const totalPossible = totalMatches * 6;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="val">${totalMatches}</div><div class="lbl">Matches Scored (from Jun 15)</div></div>
    <div class="stat-card"><div class="val">${scores[ranked[0]].total}</div><div class="lbl">Top Score (${ranked[0]})</div></div>
    <div class="stat-card"><div class="val">${scoredMatches.reduce((acc,_,i)=>{const idx=ACTUAL_RESULTS.indexOf(scoredMatches[i]);return acc+Object.values(matchDetails[idx]).filter(r=>r.type==='exact').length;},0)}</div><div class="lbl">Exact Scores Across All</div></div>
    <div class="stat-card"><div class="val">${totalPossible}</div><div class="lbl">Max Possible Points</div></div>
  `;

  let html = `<div class="lb-row lb-header">
    <div>Rank</div><div>Contestant</div>
    <div style="text-align:center">Points</div>
    <div style="text-align:center">🎯 Exact</div>
    <div style="text-align:center">✅ Winner</div>
    <div style="text-align:center">Progress</div>
  </div>`;

  ranked.forEach((c, i) => {
    const s = scores[c];
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const rankIcon = ['🥇','🥈','🥉'][i] || (i+1);
    const pct = Math.round((s.total / (totalPossible || 1)) * 100);
    html += `<div class="lb-row ${rankClass}">
      <div class="rank">${rankIcon}</div>
      <div class="name">${c}</div>
      <div class="pts">${s.total}</div>
      <div class="sub-stat">${s.exact}</div>
      <div class="sub-stat">${s.winner}</div>
      <div>
        <div style="font-size:0.72em;color:#555;text-align:right;margin-bottom:3px">${pct}%</div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round((s.total/Math.max(maxPts,1))*100)}%"></div></div>
      </div>
    </div>`;
  });

  document.getElementById('leaderboardTable').innerHTML = html;
}

function renderMatches() {
  let html = '';
  ACTUAL_RESULTS.filter(m => m.scored).forEach((match) => {
    const idx = ACTUAL_RESULTS.indexOf(match);
    const winner = getWinner(match.g1, match.g2);

    html += `<div class="match-card" data-group="${match.group}">
      <div class="match-header">
        <span class="match-group">Group ${match.group}</span>
        <span class="match-date">${match.date} · ${match.time} AEST</span>
        <span class="match-teams">${match.t1} vs ${match.t2}</span>
        <span class="actual-score">${match.g1} – ${match.g2}</span>
      </div>
      <div class="predictions-grid">`;

    const sorted = [...CONTESTANTS].sort((a,b) => matchDetails[idx][b].pts - matchDetails[idx][a].pts);
    sorted.forEach(c => {
      const r = matchDetails[idx][c];
      const cls = r.counted ? (r.type === 'exact' ? 'exact' : r.type === 'winner' ? 'winner' : r.type === 'na' ? '' : 'miss') : '';
      const predStr = r.pred ? `${r.pred.p1}–${r.pred.p2}` : '–';
      const ptsLabel = !r.counted ? '–' : r.type === 'na' ? 'N/A' : `+${r.pts} pts`;
      const ptsCls = !r.counted ? 'pts-na' : r.type === 'na' ? 'pts-na' : `pts-${r.pts}`;
      html += `<div class="pred-cell ${cls}">
        <div class="pred-name">${c.split(' ')[0]}</div>
        <div class="pred-score">${predStr}</div>
        <div class="pred-pts ${ptsCls}">${ptsLabel}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (UPCOMING_MATCHES.length > 0) {
    html += `<div class="section-title" style="margin-top:40px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #2a2a2a">📅 Upcoming Matches — All Predictions</div>`;
    UPCOMING_MATCHES.forEach(match => {
      html += `<div class="match-card" data-group="${match.group}" style="border-color:#2a2a0a">
        <div class="match-header" style="background:#1e1e00">
          <span class="match-group" style="background:#b45309">${'Group ' + match.group}</span>
          <span class="match-date">${match.date} · ${match.time} AEST</span>
          <span class="match-teams">${match.t1} vs ${match.t2}</span>
          <span style="color:#666;font-size:0.82em;font-style:italic;padding:4px 10px;border:1px solid #333;border-radius:6px">Upcoming</span>
        </div>
        <div class="predictions-grid">`;
      CONTESTANTS.forEach(c => {
        const pred = getPrediction(c, match.t1, match.t2);
        const predStr = pred ? `${pred.p1}–${pred.p2}` : '–';
        html += `<div class="pred-cell">
          <div class="pred-name">${c.split(' ')[0]}</div>
          <div class="pred-score">${predStr}</div>
          <div class="pred-pts pts-na">Pending</div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  document.getElementById('matchesGrid').innerHTML = html;
}

function renderPlayers() {
  let btnHtml = CONTESTANTS.map((c,i) =>
    `<button class="player-btn ${i===0?'active':''}" onclick="showPlayer('${c}', this)">${c}</button>`
  ).join('');
  document.getElementById('playerSelector').innerHTML = btnHtml;

  let panelsHtml = '';
  CONTESTANTS.forEach((c, ci) => {
    const s = scores[c];
    const initials = c.split(' ').map(w=>w[0]).join('').substring(0,2);
    const rank = ranked.indexOf(c) + 1;
    const rankLabel = ['🥇','🥈','🥉'][rank-1] || `#${rank}`;

    let logHtml = '';
    ACTUAL_RESULTS.filter(m => m.scored).forEach((match) => {
      const idx = ACTUAL_RESULTS.indexOf(match);
      const r = matchDetails[idx][c];
      const cls = r.type === 'exact' ? 'exact' : r.type === 'winner' ? 'winner' : 'miss';
      const predStr = r.pred ? `${r.pred.p1}–${r.pred.p2}` : 'N/A';
      const ptsStr = r.type === 'na' ? '–' : `+${r.pts}`;
      const ptsColor = r.pts === 6 ? '#4dff88' : r.pts === 3 ? '#ffdd00' : '#555';
      logHtml += `<div class="log-row ${cls}">
        <div class="log-date">Grp ${match.group} · ${match.date} ${match.time}</div>
        <div class="log-teams">${match.t1} <span style="color:#555">vs</span> ${match.t2}</div>
        <div class="log-actual">${match.g1}–${match.g2}</div>
        <div class="log-pred">${predStr}</div>
        <div class="log-pts" style="color:${ptsColor}">${ptsStr}</div>
      </div>`;
    });

    panelsHtml += `<div class="player-detail ${ci===0?'active':''}" id="player-${c.replace(/ /g,'_')}">
      <div class="player-header">
        <div class="player-avatar">${initials}</div>
        <div>
          <div style="font-size:1.4em;font-weight:800">${c}</div>
          <div style="color:#888;margin-top:4px">Rank ${rankLabel}</div>
        </div>
        <div class="player-stats">
          <div class="player-stat"><div class="v" style="color:var(--red)">${s.total}</div><div class="l">Points</div></div>
          <div class="player-stat"><div class="v" style="color:#4dff88">${s.exact}</div><div class="l">Exact</div></div>
          <div class="player-stat"><div class="v" style="color:#ffdd00">${s.winner}</div><div class="l">Winner</div></div>
          <div class="player-stat"><div class="v" style="color:#555">${s.miss}</div><div class="l">Miss</div></div>
        </div>
      </div>
      <div class="match-log">${logHtml}</div>
    </div>`;
  });
  document.getElementById('playerPanels').innerHTML = panelsHtml;
}

function showPanel(id, tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  tab.classList.add('active');
}

function filterMatches(group, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.match-card').forEach(card => {
    card.style.display = (group === 'all' || card.dataset.group === group) ? '' : 'none';
  });
}

function showPlayer(name, btn) {
  document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.player-detail').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('player-' + name.replace(/ /g,'_'));
  if (el) el.classList.add('active');
}

renderLeaderboard();
renderMatches();
renderPlayers();
</script>
</body>
</html>
